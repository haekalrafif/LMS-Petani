<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<body class="bg-gray-100 font-['Poppins',_sans-serif] text-brand-dark">
    
    <div id="loading" style="
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: rgba(21, 128, 60, 0.1); 
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        transition: opacity 0.5s ease;
    ">
        <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
        </svg>
        <p style="color: white; margin-top: 1rem; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">Memuat...</p>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>
    <header id="navbar" class="fixed top-0 left-0 right-0 z-10 bg-green-700 text-white shadow-md"></header>
    
    <main id="main-content">
